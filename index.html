    <!-- إعدادات الطباعة للـ PDF - Landscape & No Margins -->
    <style>
        @media print {
            @page {
                size: landscape; /* إجبار المتصفح على الطباعة بالعرض */
                margin: 0mm;     /* إزالة الهوامش الافتراضية */
            }
            body {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                background-color: transparent !important;
                margin: 0;
                padding: 0;
            }
            .print-page {
                width: 100vw;
                height: 100vh;
                page-break-after: always;
                box-sizing: border-box;
                padding: 1.5cm 2.5cm !important; /* هوامش داخلية للكارت */
                display: flex;
                flex-direction: column;
                justify-content: center;
                overflow: hidden;
            }
            ::-webkit-scrollbar {
                display: none;
            }
            /* إخفاء واجهة المستخدم العادية أثناء الطباعة */
            .print-hidden {
                display: none !important;
            }
        }
    </style>

            useEffect(() => { isLoopModeRef.current = isLoopMode; }, [isLoopMode]);
            useEffect(() => { isSentencesOnlyModeRef.current = isSentencesOnlyMode; }, [isSentencesOnlyMode]);
            useEffect(() => { selectedArVoiceRef.current = selectedArVoiceURI; }, [selectedArVoiceURI]);
            useEffect(() => { selectedLaVoiceRef.current = selectedLaVoiceURI; }, [selectedLaVoiceURI]);
            useEffect(() => { arReadingSpeedRef.current = arReadingSpeed; }, [arReadingSpeed]);
            useEffect(() => { laReadingSpeedRef.current = laReadingSpeed; }, [laReadingSpeed]);
            useEffect(() => { availableVoicesRef.current = availableVoices; }, [availableVoices]);

            useEffect(() => {
                const loadVoices = () => {
                    const voices = window.speechSynthesis.getVoices();
                    if(voices.length === 0) return;
                    setAvailableVoices(voices);

                    const ua = navigator.userAgent.toLowerCase();
                    const isEdge = ua.includes("edg");

                    setSelectedArVoiceURI(prev => {
                        if (prev) return prev;
                        let bestAr;
                        if (isEdge) {
                            bestAr = voices.find(v => v.lang.startsWith('ar') && /shaker|شاكر/i.test(v.name)) || voices.find(v => v.lang.startsWith('ar') && /microsoft/i.test(v.name));
                        } else {
                            bestAr = voices.find(v => v.lang.startsWith('ar') && /google/i.test(v.name));
                        }
                        if (!bestAr) bestAr = voices.find(v => v.lang.startsWith('ar'));
                        return bestAr ? bestAr.voiceURI : '';
                    });

                    setSelectedLaVoiceURI(prev => {
                        if (prev) return prev;
                        let bestLa;
                        if (isEdge) {
                            bestLa = voices.find(v => (v.lang.startsWith('it') || v.lang.startsWith('es') || v.lang.startsWith('la')) && /isabella/i.test(v.name)) || voices.find(v => (v.lang.startsWith('it') || v.lang.startsWith('es') || v.lang.startsWith('la')) && /microsoft/i.test(v.name));
                        } else {
                            bestLa = voices.find(v => (v.lang.startsWith('it') || v.lang.startsWith('es') || v.lang.startsWith('la')) && /google/i.test(v.name));
                        }
                        if (!bestLa) bestLa = voices.find(v => v.lang.startsWith('it') || v.lang.startsWith('es') || v.lang.startsWith('la'));
                        return bestLa ? bestLa.voiceURI : '';
                    });
                };

                if ('speechSynthesis' in window) {
                    loadVoices();
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                }
            }, []);

            const getVoiceForLang = (lang) => {
                const voices = availableVoicesRef.current;
                if (lang === 'la' || lang === 'it-IT') {
                    return voices.find(v => v.voiceURI === selectedLaVoiceRef.current) || null;
                } else {
                    return voices.find(v => v.voiceURI === selectedArVoiceRef.current) || null;
                }
            };

            const playAudio = (text, lang) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voice = getVoiceForLang(lang);
                    if (voice) utterance.voice = voice;
                    utterance.lang = (lang === 'la' || lang === 'it-IT') ? 'it-IT' : 'ar-SA';
                    utterance.rate = (lang === 'la' || lang === 'it-IT') ? laReadingSpeedRef.current : arReadingSpeedRef.current;
                    window.speechSynthesis.speak(utterance);
                }
            };

            const togglePlayAll = async () => {
                if (isPlayingSequence) {
                    window.speechSynthesis.cancel();
                    isPlayingRef.current = false;
                    setIsPlayingSequence(false);
                    return;
                }

                isPlayingRef.current = true;
                setIsPlayingSequence(true);

                const speakTextAsync = (text, lang) => {
                    return new Promise((resolve) => {
                        if (!isPlayingRef.current) return resolve();
                        const utterance = new SpeechSynthesisUtterance(text);
                        const voice = getVoiceForLang(lang);
                        if (voice) utterance.voice = voice;
                        utterance.lang = (lang === 'la' || lang === 'it-IT') ? 'it-IT' : 'ar-SA';
                        utterance.rate = (lang === 'la' || lang === 'it-IT') ? laReadingSpeedRef.current : arReadingSpeedRef.current;
                        utterance.onend = resolve;
                        utterance.onerror = resolve; 
                        window.speechSynthesis.speak(utterance);
                    });
                };

                try {
                    let loopIndex = currentCardIndex;
                    
                    while (isPlayingRef.current) {
                        setCurrentCardIndex(loopIndex); 
                        const currentSent = sentencesData[loopIndex];
                        
                        await new Promise(r => setTimeout(r, 150));

                        await speakTextAsync(currentSent.latin, 'it-IT');
                        if (!isPlayingRef.current) break;
                        await speakTextAsync(currentSent.arabic, 'ar-SA');
                        if (!isPlayingRef.current) break;

                        if (!isSentencesOnlyModeRef.current) {
                            for (const word of currentSent.words) {
                                if (!isPlayingRef.current) break;
                                await speakTextAsync(word.latin, 'it-IT');
                                if (!isPlayingRef.current) break;
                                await speakTextAsync(word.arabic, 'ar-SA');
                                if (!isPlayingRef.current) break;
                                
                                // تجميع عناصر الإعراب في جملة واحدة مقطعة بفواصل لتسريع النطق وجعله متصلاً
                                let parsingDetails = word.type.label;
                                if (word.details && word.details.length > 0) {
                                    parsingDetails += "، " + word.details.map(d => d.label).join("، ");
                                }
                                await speakTextAsync(parsingDetails, 'ar-SA');
                            }
                        }

                        if (!isPlayingRef.current) break;

                        if (isSingleCardModeRef.current) {
                            if (isLoopModeRef.current) continue;
                            else break;
                        } else {
                            if (loopIndex < sentencesData.length - 1) {
                                loopIndex++; 
                            } else {
                                if (isLoopModeRef.current) loopIndex = 0; 
                                else break; 
                            }
                        }
                    }
                } finally {
                    isPlayingRef.current = false;
                    setIsPlayingSequence(false);
                }
            };

            const handleNextCard = () => {
                if (currentCardIndex < sentencesData.length - 1) {
                    window.speechSynthesis.cancel();
                    setIsPlayingSequence(false);
                    isPlayingRef.current = false;
                    setCurrentCardIndex(prev => prev + 1);
                }
            };

            const handlePrevCard = () => {
                if (currentCardIndex > 0) {
                    window.speechSynthesis.cancel();
                    setIsPlayingSequence(false);
                    isPlayingRef.current = false;
                    setCurrentCardIndex(prev => prev - 1);
                }
            };

            const handleArVoiceChange = (e) => {
                setSelectedArVoiceURI(e.target.value);
                window.speechSynthesis.cancel();
            };

            const handleLaVoiceChange = (e) => {
                setSelectedLaVoiceURI(e.target.value);
                window.speechSynthesis.cancel();
            };

            const toggleSingleCardMode = () => {
                setIsSingleCardMode(!isSingleCardMode);
                window.speechSynthesis.cancel();
                setIsPlayingSequence(false);
                isPlayingRef.current = false;
            };
            const toggleLoopMode = () => setIsLoopMode(!isLoopMode);
            const toggleSentencesOnlyMode = () => {
                setIsSentencesOnlyMode(!isSentencesOnlyMode);
                window.speechSynthesis.cancel();
                setIsPlayingSequence(false);
                isPlayingRef.current = false;
            };

            const handlePrint = () => {
                window.print();
            };

            const theme = {
                bg: isDark ? 'bg-[#141218]' : 'bg-[#FEF7FF]', text: isDark ? 'text-[#E6E0E9]' : 'text-[#1D1B20]',
                headerBg: isDark ? 'bg-[#141218]' : 'bg-[#FEF7FF]', heroBg: isDark ? 'bg-[#4F378B]' : 'bg-[#EADDFF]',
                heroText: isDark ? 'text-[#EADDFF]' : 'text-[#21005D]', heroDivider: isDark ? 'bg-[#EADDFF]/20' : 'bg-[#21005D]/20',
                cardBg: isDark ? 'bg-[#2B2930]' : 'bg-[#F3EDF7]', cardBorder: isDark ? 'border-[#49454F]' : 'border-transparent',
                chipPrimaryBg: isDark ? 'bg-[#D0BCFF]' : 'bg-[#6750A4]', chipPrimaryText: isDark ? 'text-[#381E72]' : 'text-white',
                chipSecBg: isDark ? 'bg-[#4A4458]' : 'bg-[#E8DEF8]', chipSecText: isDark ? 'text-[#E8DEF8]' : 'text-[#1D192B]',
                iconHover: isDark ? 'hover:bg-[#E6E0E9]/10' : 'hover:bg-[#1D1B20]/10', audioIcon: isDark ? 'text-[#D0BCFF] hover:text-[#EADDFF]' : 'text-[#6750A4] hover:text-[#21005D]',
                modalOverlay: 'bg-black/60 backdrop-blur-sm', modalBg: isDark ? 'bg-[#2B2930]' : 'bg-[#FEF7FF]',
                modalBtn: isDark ? 'bg-[#D0BCFF] text-[#381E72]' : 'bg-[#6750A4] text-white', inputBg: isDark ? 'bg-[#1E1B24] text-[#E6E0E9]' : 'bg-white text-[#1D1B20]',
                sliderBg: isDark ? 'bg-white/20' : 'bg-black/20', sliderAccent: isDark ? 'accent-[#D0BCFF]' : 'accent-[#6750A4]',
                activeIconBg: isDark ? 'bg-[#D0BCFF] text-[#381E72]' : 'bg-[#6750A4] text-white', inactiveIconBg: isDark ? 'bg-[#EADDFF]/10 text-[#EADDFF] hover:bg-[#EADDFF]/20' : 'bg-[#6750A4]/10 text-[#6750A4] hover:bg-[#6750A4]/20'
            };

            const QuizMode = () => {
                const [quizState, setQuizState] = useState({ sentenceIdx: 0, wordIdx: -1, isFinished: false });
                const [answersRecord, setAnswersRecord] = useState([]);
                const [currentOptions, setCurrentOptions] = useState([]);
                const [feedback, setFeedback] = useState(null); 

                const getParsingString = (word) => {
                    if(!word.details || word.details.length === 0) return word.type.label;
                    return `${word.type.label} [ ${word.details.map(d=>d.label).join(' - ')} ]`;
                };

                const currentSentence = sentencesData[quizState.sentenceIdx]; 

                // قراءة الكلمة عند التخطي للجديد
                useEffect(() => {
                    if (quizState.isFinished || feedback) return;
                    if (quizState.wordIdx >= 0) playAudio(currentSentence.words[quizState.wordIdx].latin, 'it-IT');
                }, [quizState.sentenceIdx, quizState.wordIdx, quizState.isFinished]);

                useEffect(() => {
                    if (quizState.isFinished) return;
                    
                    if (quizState.wordIdx === -1) {
                        const wrongPool = sentencesData.filter((_, i) => i !== quizState.sentenceIdx).map(s => s.arabic);
                        setCurrentOptions([...wrongPool.sort(() => 0.5 - Math.random()).slice(0, 3), currentSentence.arabic].sort(() => 0.5 - Math.random()));
                    } else {
                        const correctParsing = getParsingString(currentSentence.words[quizState.wordIdx]);
                        const wrongPool = [...new Set(sentencesData.flatMap(s => s.words).map(getParsingString).filter(p => p !== correctParsing))];
                        setCurrentOptions([...wrongPool.sort(() => 0.5 - Math.random()).slice(0, 3), correctParsing].sort(() => 0.5 - Math.random()));
                    }
                }, [quizState.sentenceIdx, quizState.wordIdx, quizState.isFinished]);

                const handleOptionClick = (opt) => {
                    if (feedback) return; 
                    let isCorrect = false, correctAnswer = "", questionText = "";
                    if (quizState.wordIdx === -1) {
                        correctAnswer = currentSentence.arabic; isCorrect = opt === correctAnswer; questionText = `ترجمة: ${currentSentence.latin}`;
                    } else {
                        const word = currentSentence.words[quizState.wordIdx];
                        correctAnswer = getParsingString(word); isCorrect = opt === correctAnswer; questionText = `إعراب كلمة: ${word.latin}`;
                    }
                    setAnswersRecord(prev => [...prev, { question: questionText, sentenceContext: currentSentence.latin, userAnswer: opt, correctAnswer, isCorrect }]);
                    setFeedback({ selected: opt, isCorrect });
                    
                    setTimeout(() => {
                        setFeedback(null);
                        if (quizState.wordIdx < currentSentence.words.length - 1) setQuizState(prev => ({ ...prev, wordIdx: prev.wordIdx + 1 }));
                        else {
                            if (quizState.sentenceIdx < sentencesData.length - 1) setQuizState(prev => ({ ...prev, sentenceIdx: prev.sentenceIdx + 1, wordIdx: -1 }));
                            else setQuizState(prev => ({ ...prev, isFinished: true }));
                        }
                    }, 500); // سرعة فائقة
                };

                const skipToNextSentence = () => {
                    window.speechSynthesis.cancel();
                    setFeedback(null);
                    if (quizState.sentenceIdx < sentencesData.length - 1) {
                        setQuizState({ sentenceIdx: quizState.sentenceIdx + 1, wordIdx: -1, isFinished: false });
                    } else {
                        setQuizState(prev => ({ ...prev, isFinished: true }));
                    }
                };

                const skipToPrevSentence = () => {
                    window.speechSynthesis.cancel();
                    setFeedback(null);
                    if (quizState.sentenceIdx > 0) {
                        setQuizState({ sentenceIdx: quizState.sentenceIdx - 1, wordIdx: -1, isFinished: false });
                    }
                };

                if (quizState.isFinished) {
                    const correctCount = answersRecord.filter(a => a.isCorrect).length;
                    const percentage = Math.round((correctCount / answersRecord.length) * 100);
                    const mistakes = answersRecord.filter(a => !a.isCorrect);

                    return (
                        <div className="animate-fade-in-slide space-y-6 pb-20 print-hidden">
                            <div className={`${theme.heroBg} rounded-[28px] p-8 shadow-md text-center`}>
                                <h2 className={`text-3xl font-bold mb-4 ${theme.heroText}`}>انتهت المراجعة!</h2>
                                <div className={`text-5xl font-black mb-6 ${theme.heroText}`}>{percentage}%</div>
                                <p className={`text-lg opacity-80 ${theme.heroText}`}>أجبت بشكل صحيح على {correctCount} من أصل {answersRecord.length} سؤال.</p>
                                <button onClick={() => {setQuizState({ sentenceIdx: 0, wordIdx: -1, isFinished: false }); setAnswersRecord([]); setFeedback(null);}} className={`mt-8 px-8 py-3 rounded-xl font-bold shadow-md ${theme.activeIconBg}`}>إعادة الاختبار</button>
                            </div>
                            
                            {mistakes.length > 0 && (
                                <div className="mt-8">
                                    <h3 className="text-xl font-bold mb-4 flex items-center gap-2 text-red-500"><AlertCircle className="w-6 h-6"/> راجع أخطاءك لتتعلم منها:</h3>
                                    <div className="space-y-4">
                                        {mistakes.map((m, i) => (
                                            <div key={i} className={`${theme.cardBg} border border-red-500/30 rounded-[24px] p-5 shadow-sm`}>
                                                <p className="text-sm opacity-60 mb-1" dir="ltr">{m.sentenceContext}</p>
                                                <p className="font-bold text-lg mb-3" dir="rtl">{m.question}</p>
                                                <div className="flex flex-col gap-2">
                                                    <div className="bg-red-500/10 text-red-500 p-3 rounded-xl border border-red-500/20"><span className="font-bold block text-sm mb-1">إجابتك:</span> <span className="opacity-90">{m.userAnswer}</span></div>
                                                    <div className="bg-green-500/10 text-green-600 p-3 rounded-xl border border-green-500/20"><span className="font-bold block text-sm mb-1">الصواب هو:</span> <span className="opacity-90">{m.correctAnswer}</span></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    );
                }

                const isSentenceQuestion = quizState.wordIdx === -1;
                const currentWord = !isSentenceQuestion ? currentSentence.words[quizState.wordIdx] : null;

                return (
                    <div className="animate-fade-in-slide flex flex-col items-center max-w-3xl mx-auto w-full pb-20 print-hidden">
                        <div className="w-full bg-black/10 dark:bg-white/10 h-2 rounded-full mb-8 overflow-hidden">
                            <div className={`h-full ${theme.activeIconBg} transition-all duration-300`} style={{ width: `${(quizState.sentenceIdx / sentencesData.length) * 100}%` }}></div>
                        </div>

                        <div className="text-center mb-8 w-full">
                            <span className="inline-block px-4 py-1.5 rounded-full bg-black/5 dark:bg-white/5 text-sm font-bold opacity-70 mb-4">الجملة {currentSentence.number} من {sentencesData.length}</span>
                            
                            {/* تثبيت الطول الأدنى لمنع الرجفة عند تغير النص */}
                            <div className="relative min-h-[100px] flex items-center justify-center">
                                <h2 className="text-3xl md:text-4xl font-poppins font-bold tracking-wide leading-relaxed mb-6" dir="ltr">
                                    {isSentenceQuestion ? <span>{currentSentence.latin}</span> : currentSentence.latin.split(' ').map((w, i) => {
                                        const cleanW = w.replace(/[^a-zA-Z]/g, '');
                                        const isHighlight = cleanW === currentWord.latin;
                                        return <span key={i} className={`${isHighlight ? 'text-[#6750A4] dark:text-[#D0BCFF] underline decoration-2 underline-offset-4' : 'opacity-50'} transition-all mx-1`}>{w}</span>;
                                    })}
                                </h2>
                            </div>
                            
                            <div className="flex items-center justify-center gap-2 text-xl font-bold bg-[#EADDFF]/20 dark:bg-[#4F378B]/20 py-4 px-6 rounded-2xl border border-[#EADDFF]/30 dark:border-[#4F378B]/30">
                                {isSentenceQuestion ? <span>اختر الترجمة الصحيحة للجملة:</span> : <span>ما هو التحليل الإعرابي الدقيق لكلمة <span className="text-[#6750A4] dark:text-[#D0BCFF]">({currentWord.latin})</span>؟</span>}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 gap-4 w-full">
                            {currentOptions.map((opt, i) => {
                                let btnStyle = `${theme.cardBg} border ${theme.cardBorder} hover:border-[#6750A4]/50 dark:hover:border-[#D0BCFF]/50 hover:shadow-md`;
                                let icon = null;
                                if (feedback && feedback.selected === opt) {
                                    // إزالة ال scale لمنع الرجفة
                                    btnStyle = feedback.isCorrect ? 'bg-green-500 text-white border-green-600 shadow-lg' : 'bg-red-500 text-white border-red-600 shadow-lg';
                                    icon = feedback.isCorrect ? <CheckCircle className="w-6 h-6"/> : <XIcon className="w-6 h-6"/>;
                                }
                                return (
                                    <button key={i} onClick={() => handleOptionClick(opt)} disabled={feedback !== null} className={`relative min-h-[80px] p-5 rounded-2xl text-lg font-medium transition-colors duration-150 flex items-center justify-between text-right ${btnStyle}`}>
                                        <span>{opt}</span>{icon}
                                    </button>
                                );
                            })}
                        </div>
                        
                        {/* شريط ملاحة سفلي خاص بالاختبار للتخطي السريع */}
                        <div className={`fixed bottom-0 left-0 right-0 ${theme.headerBg} border-t ${theme.cardBorder} shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] p-4 flex items-center justify-between z-20`}>
                            <div className="max-w-5xl 2xl:max-w-6xl mx-auto w-full flex items-center justify-between px-2">
                                <button onClick={skipToNextSentence} disabled={quizState.sentenceIdx === sentencesData.length - 1} className={`flex items-center gap-2 px-5 py-2.5 rounded-xl font-bold transition-all duration-200 ${quizState.sentenceIdx === sentencesData.length - 1 ? 'opacity-30 cursor-not-allowed' : `hover:scale-105 active:scale-95 ${theme.modalBtn}`}`}>
                                    <ChevronRight className="w-5 h-5" /><span>تخطي للتالي</span>
                                </button>
                                <div className="text-base font-bold opacity-80 tracking-wide">سؤال <span className="text-lg text-[#6750A4] dark:text-[#D0BCFF] mx-1">{quizState.sentenceIdx + 1}</span> من {sentencesData.length}</div>
                                <button onClick={skipToPrevSentence} disabled={quizState.sentenceIdx === 0} className={`flex items-center gap-2 px-5 py-2.5 rounded-xl font-bold transition-all duration-200 ${quizState.sentenceIdx === 0 ? 'opacity-30 cursor-not-allowed' : `hover:scale-105 active:scale-95 ${theme.modalBtn}`}`} dir="ltr">
                                    <ChevronLeft className="w-5 h-5" /><span className="font-notokufi">السابق</span>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const currentSentence = sentencesData[currentCardIndex];

            return (
                <div className={`min-h-screen flex flex-col transition-colors duration-300 ${theme.bg} ${theme.text} pb-24 font-notokufi relative`}>
                    
                    <div className="print-hidden flex flex-col flex-grow">
                        {/* نافذة الإعدادات */}
                        {isSettingsOpen && (
                            <div className={`fixed inset-0 z-[70] flex items-center justify-center p-4 transition-opacity ${theme.modalOverlay}`} onClick={() => setIsSettingsOpen(false)}>
                                <div className={`${theme.modalBg} border ${theme.cardBorder} p-6 rounded-[28px] max-w-md w-full shadow-2xl transform transition-transform`} onClick={e => e.stopPropagation()}>
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-xl font-bold flex items-center gap-2"><SettingsIcon className="w-5 h-5"/> الإعدادات</h3>
                                        <button onClick={() => setIsSettingsOpen(false)} className={`p-2 rounded-full ${theme.iconHover}`}><XIcon className="w-5 h-5" /></button>
                                    </div>
                                    
                                    <div className="space-y-6 mb-8">
                                        <div>
                                            <label className="block text-sm font-bold mb-2 opacity-90">صوت اللغة العربية</label>
                                            <div className="relative">
                                                <select 
                                                    value={selectedArVoiceURI} 
                                                    onChange={e => {setSelectedArVoiceURI(e.target.value); window.speechSynthesis.cancel();}}
                                                    className={`appearance-none w-full p-4 pl-12 rounded-2xl border border-gray-600 focus:border-transparent ${theme.inputBg} focus:outline-none focus:ring-2 focus:ring-[#D0BCFF] font-medium shadow-sm transition-all cursor-pointer hover:bg-white/5`}
                                                >
                                                    {availableVoices.filter(v => v.lang.startsWith('ar')).map(v => (
                                                        <option key={v.voiceURI} value={v.voiceURI}>{v.name}</option>
                                                    ))}
                                                    {availableVoices.filter(v => v.lang.startsWith('ar')).length === 0 && <option value="">لا توجد أصوات عربية مثبتة</option>}
                                                </select>
                                                <div className="pointer-events-none absolute inset-y-0 left-4 flex items-center opacity-70"><ChevronDown className="w-5 h-5" /></div>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-bold mb-2 opacity-90">صوت اللاتينية</label>
                                            <div className="relative">
                                                <select 
                                                    value={selectedLaVoiceURI} 
                                                    onChange={e => {setSelectedLaVoiceURI(e.target.value); window.speechSynthesis.cancel();}}
                                                    className={`appearance-none w-full p-4 pl-12 rounded-2xl border border-gray-600 focus:border-transparent ${theme.inputBg} focus:outline-none focus:ring-2 focus:ring-[#D0BCFF] font-medium shadow-sm transition-all cursor-pointer hover:bg-white/5`}
                                                >
                                                    {availableVoices.filter(v => v.lang.startsWith('it') || v.lang.startsWith('es') || v.lang.startsWith('la')).map(v => (
                                                        <option key={v.voiceURI} value={v.voiceURI}>{v.name}</option>
                                                    ))}
                                                    {availableVoices.filter(v => v.lang.startsWith('it') || v.lang.startsWith('es') || v.lang.startsWith('la')).length === 0 && <option value="">لا توجد أصوات مناسبة مثبتة</option>}
                                                </select>
                                                <div className="pointer-events-none absolute inset-y-0 left-4 flex items-center opacity-70"><ChevronDown className="w-5 h-5" /></div>
                                            </div>
                                        </div>

                                        <div>
                                            <div className="flex justify-between items-center mb-3">
                                                <label className="block text-sm font-bold opacity-90">سرعة القراءة العربية ({arReadingSpeed}x)</label>
                                            </div>
                                            <input 
                                                type="range" min="0.5" max="2" step="0.1" 
                                                value={arReadingSpeed} 
                                                onChange={e => {setArReadingSpeed(parseFloat(e.target.value)); window.speechSynthesis.cancel();}} 
                                                className={`w-full h-2 rounded-lg appearance-none cursor-pointer ${theme.sliderBg} ${theme.sliderAccent}`}
                                            />
                                        </div>
                                        
                                        <div>
                                            <div className="flex justify-between items-center mb-3">
                                                <label className="block text-sm font-bold opacity-90">سرعة القراءة اللاتينية ({laReadingSpeed}x)</label>
                                            </div>
                                            <input 
                                                type="range" min="0.5" max="2" step="0.1" 
                                                value={laReadingSpeed} 
                                                onChange={e => {setLaReadingSpeed(parseFloat(e.target.value)); window.speechSynthesis.cancel();}} 
                                                className={`w-full h-2 rounded-lg appearance-none cursor-pointer ${theme.sliderBg} ${theme.sliderAccent}`}
                                            />
                                            <div className="flex justify-between text-xs opacity-50 mt-2 font-bold"><span>بطيء</span><span>سريع</span></div>
                                        </div>
                                    </div>

                                    <button onClick={() => setIsSettingsOpen(false)} className={`w-full py-4 rounded-xl font-bold transition-transform active:scale-95 shadow-md ${theme.modalBtn}`}>حفظ الإعدادات</button>
                                </div>
                            </div>
                        )}

                        {/* النافذة المنبثقة لشرح الإعراب */}
                        {selectedChip && (
                            <div className={`fixed inset-0 z-[60] flex items-center justify-center p-4 transition-opacity ${theme.modalOverlay}`} onClick={() => setSelectedChip(null)}>
                                <div className={`${theme.modalBg} border ${theme.cardBorder} p-6 rounded-[24px] max-w-sm w-full shadow-2xl transform transition-transform`} onClick={e => e.stopPropagation()}>
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-xl font-bold">{selectedChip.label}</h3>
                                        <button onClick={() => setSelectedChip(null)} className={`p-1 rounded-full ${theme.iconHover}`}><XIcon className="w-5 h-5" /></button>
                                    </div>
                                    <p className="text-base leading-relaxed opacity-90 mb-6">{selectedChip.expl}</p>
                                    <button onClick={() => setSelectedChip(null)} className={`w-full py-2.5 rounded-xl font-bold transition-transform active:scale-95 ${theme.modalBtn}`}>حسناً، أقنعتني</button>
                                </div>
                            </div>
                        )}

                        <header className={`${theme.headerBg} sticky top-0 z-10 px-4 h-16 flex items-center justify-between shadow-sm transition-colors duration-300`}>
                            <div className="flex items-center"><BookOpen className="w-6 h-6" /><h1 className="text-xl font-bold ml-4 mr-2">المترجم اللاتيني</h1></div>
                            <div className="flex items-center gap-1">
                                {activeTab === 'شرح' && (
                                    <button onClick={handlePrint} className={`p-2 rounded-full transition-colors ${theme.iconHover}`} title="حفظ الكروت كملف PDF">
                                        <PrinterIcon className="w-6 h-6" />
                                    </button>
                                )}
                                <button onClick={() => setIsSettingsOpen(true)} className={`p-2 rounded-full transition-colors ${theme.iconHover}`} title="الإعدادات"><SettingsIcon className="w-6 h-6" /></button>
                                <button onClick={() => setIsDark(!isDark)} className={`p-2 rounded-full transition-colors ${theme.iconHover}`} title="تبديل الوضع">{isDark ? <Sun className="w-6 h-6" /> : <Moon className="w-6 h-6" />}</button>
                            </div>
                        </header>

                        {/* تبويبات التبديل */}
                        <div className="flex justify-center items-center mt-6 relative z-10 gap-4">
                            <div className={`p-1.5 rounded-2xl flex gap-1 ${theme.cardBg} border ${theme.cardBorder} shadow-sm`}>
                                <button onClick={() => { setActiveTab('شرح'); window.speechSynthesis.cancel(); setIsPlayingSequence(false); isPlayingRef.current = false; }} className={`px-8 py-2.5 rounded-xl font-bold transition-all duration-300 ${activeTab === 'شرح' ? theme.activeIconBg + ' shadow-md' : 'opacity-70 hover:opacity-100'}`}>شرح</button>
                                <button onClick={() => { setActiveTab('مراجعة'); window.speechSynthesis.cancel(); setIsPlayingSequence(false); isPlayingRef.current = false; }} className={`px-8 py-2.5 rounded-xl font-bold transition-all duration-300 ${activeTab === 'مراجعة' ? theme.activeIconBg + ' shadow-md' : 'opacity-70 hover:opacity-100'}`}>مراجعة</button>
                            </div>
                        </div>

                        <main className="p-4 max-w-5xl 2xl:max-w-6xl mx-auto w-full flex-grow flex flex-col justify-center">
                            {activeTab === 'شرح' && (
                                <div key={currentSentence.number} className="animate-fade-in-slide space-y-6">
                                    <div className={`${theme.heroBg} rounded-[28px] p-6 shadow-md transition-colors duration-300 relative overflow-hidden`}>
                                        {isPlayingSequence && <div className="absolute inset-0 bg-white/5 animate-pulse-slow pointer-events-none"></div>}

                                        <div className={`flex flex-col xl:flex-row xl:items-center justify-between mb-6 gap-4 ${theme.heroText}`}>
                                            <div className="flex items-center gap-2"><Info className="w-5 h-5" /><span className="font-bold text-sm">الجملة الأساسية (رقم {currentSentence.number})</span></div>
                                            <div className="flex flex-wrap items-center gap-2">
                                                <button onClick={toggleSingleCardMode} className={`flex items-center justify-center p-2 rounded-xl transition-all duration-200 ${isSingleCardMode ? theme.activeIconBg : theme.inactiveIconBg}`} title={isSingleCardMode ? "إيقاف القراءة عند نهاية البطاقة" : "الانتقال التلقائي للبطاقة التالية"}><AutoNextIcon className="w-5 h-5" active={isSingleCardMode} /></button>
                                                <button onClick={toggleLoopMode} className={`flex items-center justify-center p-2 rounded-xl transition-all duration-200 ${isLoopMode ? theme.activeIconBg : theme.inactiveIconBg}`} title={isLoopMode ? "تكرار مستمر" : "تكرار مستمر معطل"}><LoopIcon className="w-5 h-5" /></button>
                                                <button onClick={toggleSentencesOnlyMode} className={`flex items-center justify-center p-2 rounded-xl transition-all duration-200 ${isSentencesOnlyMode ? theme.activeIconBg : theme.inactiveIconBg}`} title={isSentencesOnlyMode ? "قراءة الجمل فقط" : "قراءة الجمل مع الإعراب"}><ModeIcon className="w-5 h-5" active={isSentencesOnlyMode} /></button>
                                                <button onClick={togglePlayAll} className={`flex items-center gap-2 px-5 py-2 rounded-xl bg-black/10 hover:bg-black/20 dark:bg-white/10 dark:hover:bg-white/20 transition-all font-bold text-sm ml-2`}>{isPlayingSequence ? <><Square className="w-4 h-4" /> إيقاف القراءة</> : <><Play className="w-4 h-4" /> ابدأ القراءة</>}</button>
                                            </div>
                                        </div>
                                        
                                        <div className="flex flex-col sm:flex-row items-stretch justify-between w-full gap-4 relative z-10">
                                            <div className="flex-1 flex flex-row items-center justify-start gap-3 w-full sm:w-auto">
                                                <button onClick={() => playAudio(currentSentence.arabic, 'ar-SA')} className={`p-2 rounded-full transition-colors ${theme.iconHover} ${theme.heroText}`}><Volume2 className="w-5 h-5" /></button>
                                                <p className={`text-xl sm:text-2xl font-bold text-right ${theme.heroText}`}>{currentSentence.arabic}</p>
                                            </div>
                                            <div className={`w-[1px] min-h-full ${theme.heroDivider} hidden sm:block`} />
                                            <div className={`w-full h-[1px] ${theme.heroDivider} block sm:hidden my-2`} />
                                            <div className="flex-1 flex flex-row items-center justify-start gap-3 w-full sm:w-auto" dir="ltr">
                                                <button onClick={() => playAudio(currentSentence.latin, 'it-IT')} className={`p-2 rounded-full transition-colors ${theme.iconHover} ${theme.heroText}`}><Volume2 className="w-5 h-5" /></button>
                                                <p className={`text-xl sm:text-2xl font-poppins tracking-wide text-left ${theme.heroText} w-full`}>{currentSentence.latin}</p>
                                            </div>
                                        </div>
                                    </div>

                                    <h2 className="text-lg font-bold px-2 pt-2 opacity-80 text-right flex flex-col md:flex-row md:items-center justify-between">
                                        <span>الإعراب والتحليل (Morphology)</span>
                                        <span className="text-sm font-normal opacity-60">توضيحات منطقية (اضغط على الإعراب)</span>
                                    </h2>

                                    <div className="space-y-4">
                                        {currentSentence.words.map((word) => <WordCard key={word.id} word={word} theme={theme} playAudio={playAudio} onChipClick={setSelectedChip} />)}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'مراجعة' && <QuizMode />}

                        </main>

                        {/* شريط الملاحة السفلي للشرح */}
                        {activeTab === 'شرح' && (
                            <div className={`fixed bottom-0 left-0 right-0 ${theme.headerBg} border-t ${theme.cardBorder} shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] p-4 flex items-center justify-between z-20 transition-colors duration-300`}>
                                <div className="max-w-5xl 2xl:max-w-6xl mx-auto w-full flex items-center justify-between px-2">
                                    <button onClick={handleNextCard} disabled={currentCardIndex === sentencesData.length - 1} className={`flex items-center gap-2 px-5 py-2.5 rounded-xl font-bold transition-all duration-200 ${currentCardIndex === sentencesData.length - 1 ? 'opacity-30 cursor-not-allowed' : `hover:scale-105 active:scale-95 ${theme.modalBtn}`}`}><ChevronRight className="w-5 h-5" /><span>التالي</span></button>
                                    <div className="text-base font-bold opacity-80 tracking-wide">بطاقة <span className="text-lg text-[#6750A4] dark:text-[#D0BCFF] mx-1">{currentCardIndex + 1}</span> من {sentencesData.length}</div>
                                    <button onClick={handlePrevCard} disabled={currentCardIndex === 0} className={`flex items-center gap-2 px-5 py-2.5 rounded-xl font-bold transition-all duration-200 ${currentCardIndex === 0 ? 'opacity-30 cursor-not-allowed' : `hover:scale-105 active:scale-95 ${theme.modalBtn}`}`} dir="ltr"><ChevronLeft className="w-5 h-5" /><span className="font-notokufi">السابق</span></button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* --- عرض خاص بالطباعة فقط (الـ PDF) --- */}
                    <div className="hidden print:block w-full text-right" dir="rtl">
                        {sentencesData.map((sentence, idx) => (
                            <div key={idx} className={`print-page ${theme.bg} ${theme.text}`}>
                                <div className={`${theme.heroBg} rounded-[28px] p-8 shadow-md mb-8`}>
                                    <div className={`flex items-center gap-2 mb-8 ${theme.heroText}`}>
                                        <Info className="w-6 h-6" />
                                        <span className="font-bold text-lg">الجملة الأساسية (رقم {sentence.number})</span>
                                    </div>
                                    <div className="flex justify-between items-center w-full gap-8">
                                        <p className={`text-4xl font-bold text-right ${theme.heroText}`}>{sentence.arabic}</p>
                                        <p className={`text-4xl font-poppins tracking-wide text-left ${theme.heroText}`} dir="ltr">{sentence.latin}</p>
                                    </div>
                                </div>

                                <h2 className="text-2xl font-bold px-4 pt-2 opacity-80 text-right mb-6 border-b border-gray-500/20 pb-4">
                                    الإعراب والتحليل (Morphology)
                                </h2>

                                <div className="space-y-6">
                                    {sentence.words.map((word) => (
                                        <div key={word.id} className={`${theme.cardBg} border ${theme.cardBorder} rounded-[24px] p-6`}>
                                            <div className="flex justify-between items-center w-full gap-6">
                                                <div className="flex flex-wrap items-center gap-3">
                                                    <span className={`px-5 py-2 ${theme.chipPrimaryBg} ${theme.chipPrimaryText} rounded-xl text-lg font-bold`}>{word.type.label}</span>
                                                    {word.details.length > 0 && <span className="opacity-50 mx-2 text-xl">|</span>}
                                                    {word.details.map((detail, index) => (
                                                        <span key={index} className={`px-4 py-2 ${theme.chipSecBg} ${theme.chipSecText} rounded-xl text-lg font-medium`}>{detail.label}</span>
                                                    ))}
                                                </div>
                                                <div className="flex items-center gap-6">
                                                    <span className="text-2xl font-bold text-right">{word.arabic}</span>
                                                    <span className="opacity-30 text-2xl">-</span>
                                                    <span className="text-2xl font-bold font-poppins text-left" dir="ltr">{word.latin}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function WordCard({ word, theme, playAudio, onChipClick }) {
            return (
                <div className={`${theme.cardBg} border ${theme.cardBorder} rounded-[24px] p-5 shadow-sm transition-colors duration-150`}>
                    <div className="flex flex-col lg:flex-row justify-between items-center w-full gap-4">
                        <div className="flex flex-wrap items-center gap-2 order-2 lg:order-1 w-full lg:w-auto">
                            <button onClick={() => onChipClick(word.type)} className={`px-4 py-1.5 ${theme.chipPrimaryBg} ${theme.chipPrimaryText} rounded-lg text-sm font-bold shadow-sm transition-transform active:scale-95 cursor-pointer hover:opacity-90`}>{word.type.label}</button>
                            {word.details.length > 0 && <span className="opacity-50 mx-1">|</span>}
                            {word.details.map((detail, index) => <button key={index} onClick={() => onChipClick(detail)} className={`px-3 py-1.5 ${theme.chipSecBg} ${theme.chipSecText} rounded-lg text-sm font-medium transition-transform active:scale-95 cursor-pointer hover:opacity-90`}>{detail.label}</button>)}
                        </div>
                        <div className="flex flex-col sm:flex-row items-center gap-4 order-1 lg:order-2 w-full lg:w-auto lg:justify-end justify-start">
                            <div className="flex items-center gap-2 justify-end w-full sm:w-auto" dir="rtl"><button onClick={() => playAudio(word.arabic, 'ar-SA')} className={`p-1.5 rounded-full ${theme.audioIcon} ${theme.iconHover} transition-colors`} title="استمع للعربية"><Volume2 className="w-4 h-4" /></button><span className="text-xl font-bold min-w-[70px] text-right">{word.arabic}</span></div>
                            <span className="opacity-30 hidden sm:block">-</span>
                            <div className="flex items-center gap-2 justify-start w-full sm:w-auto" dir="ltr"><button onClick={() => playAudio(word.latin, 'it-IT')} className={`p-1.5 rounded-full ${theme.audioIcon} ${theme.iconHover} transition-colors`} title="استمع للاتينية"><Volume2 className="w-4 h-4" /></button><span className="text-xl font-bold font-poppins text-left">{word.latin}</span></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
